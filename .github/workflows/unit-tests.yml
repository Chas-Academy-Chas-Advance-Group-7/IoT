name: Run unit-tests

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"
  workflow_dispatch:

jobs:
  runUnitTests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PlatformIO environment
        uses: ./.github/workflows/setup-platformio

      - name: Run native unit tests
        shell: bash
        run: |
          cd src_package_arduino
          pio test -e native
